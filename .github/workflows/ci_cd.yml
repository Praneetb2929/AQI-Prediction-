name: AQI Full CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install dependencies
      run: pip install -r requirements.txt

    # 4. Train model
    - name: Train model
      run: python src/train.py

    # 5. Evaluate model
    - name: Evaluate model
      run: python src/evaluate.py

    # -------------------------
    # 🐳 DOCKER BUILD & PUSH
    # -------------------------

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: praneetz/aqi-app:latest

    # -------------------------
    # 🚀 DEPLOY ON EC2
    # -------------------------

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull yourusername/aqi-app:latest
          docker stop aqi-container || true
          docker rm aqi-container || true
          docker run -d -p 8501:8501 --name aqi-container praneetz/aqi-app:latest
